# vm-mqtt-monitor configuration
# Copy this file to config.yaml and edit the values.

# ── MQTT Broker ──────────────────────────────────────────────────────────────
mqtt_host: "192.168.1.10"        # IP or hostname of your MQTT broker (e.g. Home Assistant)
mqtt_port: 1883                   # Default: 1883 (or 8883 for TLS)
mqtt_user: "mqtt_user"            # MQTT username (leave empty if no auth)
mqtt_password: "mqtt_password"    # MQTT password
mqtt_tls: false                   # Set to true for TLS/SSL connections
mqtt_keepalive: 60                # Keepalive in seconds

# ── Discovery & Topics ───────────────────────────────────────────────────────
discovery_prefix: "homeassistant" # HA MQTT discovery prefix (default: homeassistant)
base_topic: "vmmonitor"           # Base topic for state messages

# ── Host Identity ─────────────────────────────────────────────────────────────
# hostname_override: "my-server"  # Optional: override auto-detected hostname

# ── Monitoring ───────────────────────────────────────────────────────────────
interval: 60                      # Polling interval in seconds

monitor_swap: true                # Monitor swap/page file usage
monitor_network: true             # Monitor total data sent/received since boot (in MB)
monitor_uptime: true              # Monitor system uptime

# ── Remote Control ────────────────────────────────────────────────────────────
# Adds Restart / Shutdown buttons to the device in Home Assistant.
# The service must run as root (Linux) or Administrator (Windows) for these to work.
allow_restart: true               # Show "System Restart" button in Home Assistant
allow_shutdown: true              # Show "System Shutdown" button in Home Assistant

# Disk paths to monitor.
# Linux examples: ["/", "/home", "/data"]
# Windows examples: ["C:\\", "D:\\"]
disk_paths:
  - "/"
  # - "/home"
  # - "C:\\"
  # - "D:\\"
